<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关注公众号 | 月明家庭教育</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23C9A96E'/%3E%3Ctext x='16' y='20' text-anchor='middle' fill='white' font-size='14' font-family='serif'%3E%E6%9C%88%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .qr-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg);
    }
    .qr-page__card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow-card);
      text-align: center;
      max-width: 400px;
    }
    .qr-page__title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--heading);
      margin-bottom: 12px;
    }
    .qr-page__subtitle {
      font-size: 0.9rem;
      color: var(--body);
      margin-bottom: 32px;
    }
    .qr-page__img {
      width: 280px;
      height: 280px;
      margin: 0 auto 24px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .qr-page__hint {
      font-size: 0.85rem;
      color: var(--body);
      opacity: 0.7;
      margin-bottom: 24px;
    }
    .qr-page__back {
      display: inline-block;
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.3s ease;
    }
    .qr-page__back:hover {
      background: var(--accent-dark);
    }
  </style>
</head>
<body>
  <div class="qr-page">
    <div class="qr-page__card">
      <div class="qr-page__title">关注公众号</div>
      <div class="qr-page__subtitle">青春期家庭指南</div>
      <img src="images/qr/qrcode-wechat-mp.jpg" alt="公众号二维码" class="qr-page__img">
      <div class="qr-page__hint">打开微信扫一扫</div>
      <a href="index.html" class="qr-page__back">← 返回首页</a>
    </div>
  </div>
</body>
</html>
