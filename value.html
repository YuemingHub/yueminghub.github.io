        </div>
        <div class="hero-split__aside">
          <p class="hero-note">真正重要的，不只是把眼前稳住，而是让这个家慢慢恢复一种面向未来的能力。</p>
          <p class="page-lead">很多家庭真正失去的，不只是成绩或秩序，而是一起面对未来的能力。</p>

    <section class="quiet-content">
      <div class="section-shell text-flow">
        <h2>走向未来，不是更用力地催。</h2>
        <p>它意味着家长和孩子都还能够从今天重新开始。家里可以有边界，也可以有温度；可以谈现实，也不必把每一次对话都变成审判。</p>
        <p>我更在意的是：这个家能不能慢慢恢复一种能力。遇到问题时，不再只靠吼、躲、忍、拖，而是能停下来，看清楚，再走下一步。</p>
        <div class="soft-note">
          <p>不是把每一步都走对，而是这个家重新愿意一起往前走。</p>
