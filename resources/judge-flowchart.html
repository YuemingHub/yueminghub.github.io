        <h1>家庭卡点判断流程</h1>
        <ol class="print-list">
          <li><strong>一开口就爆？</strong> 先看关系是否太紧。先减伤，不急着讲道理。</li>
          <li><strong>越管越乱？</strong> 先看边界是否太散。减少碎片化控制，守住少数底线。</li>
          <li><strong>计划总落不下去？</strong> 先看执行承接是否太弱。把下一步拆小。</li>
          <li><strong>孩子明显退缩？</strong> 先看是否已经退行。恢复最低连接，不急着推回现实。</li>
        </ol>
        <div class="soft-note">
          <p>判断不是为了定性，而是为了知道现在先别在哪里继续加压。</p>
        </div>
      </div>
