<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#F7F3EA" />
<link rel="stylesheet" href="css/style.css" />
<script defer src="js/site-shell.js"></script>
<script defer src="js/site-ui.js"></script>
<script defer src="js/main.js"></script>

  <title>背后托住的那一半｜向未来家庭教育</title>
  <meta name="description" content="家庭教育服务背后的整理、记录、复盘与工具化支撑。" />
</head>
<body class="calm-site inner-page">
  <div data-site-header></div>
  <main id="main" class="page-main">
    <section class="page-hero">
      <div class="section-shell narrow">
        <p class="eyebrow">背后的支撑</p>
        <h1>真正托住一个家的，不只是当场说了什么。</h1>
        <p class="page-lead">还有看见、记录、复盘、拆解，以及下一次回到现场时能更稳一点。</p>
      </div>
    </section>

    <section class="quiet-content">
      <div class="section-shell">
        <div class="layer-grid three">
          <article class="layer-card">
            <span>记录</span>
            <h2>把混乱现场整理出来</h2>
            <p>不是堆材料，而是找到反复出现的触发点和卡点。</p>
          </article>
          <article class="layer-card">
            <span>复盘</span>
            <h2>看见什么正在变好</h2>
            <p>小变化也要被看见，否则家庭容易只记得新的失败。</p>
          </article>
          <article class="layer-card">
            <span>工具</span>
            <h2>让下一步更可执行</h2>
            <p>把建议落到父母能做、孩子能承受、家庭能坚持的尺度。</p>
          </article>
        </div>

        <div class="next-steps center">
          <a class="soft-button secondary" href="resources/parent-checklist.html">看家长自检句卡</a>
          <a class="text-link" href="contact.html">带一个问题来</a>
        </div>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
</body>
</html>
