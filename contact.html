  <title>带一个问题来｜月明 · 向未来家庭教育</title>
  <meta name="description" content="第一次联系，不用讲完整个故事。你只需要先带来眼前最卡的一件事。" />
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/site-shell.js"></script>
  <script defer src="js/site-ui.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body class="calm-site inner-page">
  <div data-site-header></div>
  <main id="main" class="page-main">
    <section class="page-hero">
      <div class="section-shell narrow">
        <p class="eyebrow">第一次联系</p>
        <h1>不用先把故事讲完整。</h1>
        <p class="page-lead">你只需要先带来眼前最卡的一件事。是一说就炸，还是已经越来越退；是全家都很累，还是你不知道再往哪儿用力。</p>
      </div>
    </section>

    <section class="quiet-content">
      <div class="section-shell contact-shell">
        <form class="contact-form" action="https://formspree.io/f/xzdodazd" method="POST">
          <label>
            怎么称呼你
            <input name="name" type="text" autocomplete="name" placeholder="例如：张妈妈" />
          </label>

          <label>
            联系方式
            <input name="contact" type="text" autocomplete="email" placeholder="微信 / 手机 / 邮箱" required />
          </label>

          <label>
            现在最卡的一件事
            <textarea name="message" rows="7" placeholder="不用写完整，先写最让你不知道怎么办的那一件事。" required></textarea>
          </label>

          <label class="select-label">
            更像哪一种
            <select name="state">
              <option value="">先不选择也可以</option>
              <option>一说就炸</option>
              <option>谁也不想再说</option>
              <option>孩子退回房间</option>
              <option>我越管越乱</option>
              <option>我也快撑不住了</option>
            </select>
          </label>

          <input type="hidden" name="_subject" value="向未来家庭教育：新的问题提交" />
          <input type="hidden" name="_next" value="thanks.html" />
          <button class="soft-button primary" type="submit">把问题放在这里</button>
        </form>

        <aside class="contact-aside">
          <p class="eyebrow">你可以只写一点点</p>
          <h2>第一次，不是审问。</h2>
          <p>我会先帮你看：这件事现在更像卡在关系、边界、执行，还是退行，而不是先催你准备完整材料。</p>
        </aside>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
</body>
</html>
